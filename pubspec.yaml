name: flutter_webview_communication
description: A comprehensive Flutter plugin for bi-directional WebView communication with 70+ methods including navigation, security, monitoring, and advanced features.
version: 0.3.0
homepage: https://github.com/YankyJayChris/flutter_webview_communication

environment:
  sdk: '>=3.4.1 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.9.0
  webview_flutter_android: ">=3.16.9 <5.0.0"
  webview_flutter_wkwebview: ^3.25.0
  permission_handler: ^11.3.1
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  dio: ^5.7.0
  webview_windows: ^0.4.0
  # Note: Web platform uses dart:html IFrameElement (built-in)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

